<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Path</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="view-material.css">
    <link rel="stylesheet" href="components.css">
</head>
<body>
    <div id="topNavMount"></div>

    <div class="details-shell">
        <section class="finder-bar" aria-label="Find Material">
            <a class="back-link" href="index.html">Back to Repository</a>
            <div class="finder-input-wrap">
                <input id="pathSearchInput" class="finder-input" type="text" placeholder="Search material in this path" autocomplete="off">
                <div id="pathSuggestionsPanel" class="suggestions-panel"></div>
            </div>
            <button id="pathSearchBtn" class="action-btn primary">Find Material</button>
        </section>

        <section class="breadcrumb-wrap">
            <div class="breadcrumb-head">
                <nav id="pathBreadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
                <button id="pathBreadcrumbToggle" class="breadcrumb-toggle" type="button" aria-expanded="false" aria-controls="pathBreadcrumbMore">Show More</button>
            </div>
            <div id="pathBreadcrumbMore" class="breadcrumb-more" hidden>
                <div class="breadcrumb-group">
                    <h4>Categories</h4>
                    <div id="pathBreadcrumbCategories" class="breadcrumb-tags"></div>
                </div>
                <div class="breadcrumb-group">
                    <h4>Grades</h4>
                    <div id="pathBreadcrumbGrades" class="breadcrumb-tags"></div>
                </div>
                <div class="breadcrumb-group">
                    <h4>Subjects</h4>
                    <div id="pathBreadcrumbSubjects" class="breadcrumb-tags"></div>
                </div>
                <div class="breadcrumb-group">
                    <h4>Tags</h4>
                    <div id="pathBreadcrumbTags" class="breadcrumb-tags"></div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="list-head">
                <h2 id="pathTitle">Path Materials</h2>
                <p id="pathCount" class="list-count">0 materials</p>
            </div>
            <div id="pathMaterialsList" class="path-materials-list"></div>
            <div id="pathEmpty" class="empty-state">No materials found for this path.</div>
        </section>
    </div>

    <div id="footerMount"></div>

    <script src="components.js"></script>
    <script src="material-path.js"></script>
</body>
</html>
